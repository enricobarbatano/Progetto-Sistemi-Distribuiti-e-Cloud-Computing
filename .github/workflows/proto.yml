name: Protobuf CI

on:
  push:
    branches: [ main, master ]
    paths:
      - 'proto/**'
      - 'gen/go/**'
      - 'buf.yaml'
      - '.github/workflows/proto.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'proto/**'
      - 'gen/go/**'
      - 'buf.yaml'
      - '.github/workflows/proto.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  proto-ci:
    name: Protobuf lint and generated code drift
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Set up Buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true

      - name: Buf lint
        run: buf lint

      - name: Buf format check
        run: buf format --diff --exit-code

      - name: Buf breaking check against base branch
        if: github.event_name == 'pull_request'
        run: buf breaking --against '.git#branch=${{ github.base_ref }}'

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "33.0"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install pinned protoc Go plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.10
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.5.1
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Show protobuf tool versions
        run: |
          protoc --version
          protoc-gen-go --version
          protoc-gen-go-grpc --version

      - name: Regenerate protobuf stubs
        run: |
          protoc --go_out=. --go_opt=module=github.com/enricobarbatano/Progetto-Sistemi-Distribuiti-e-Cloud-Computing \
            --go-grpc_out=. --go-grpc_opt=module=github.com/enricobarbatano/Progetto-Sistemi-Distribuiti-e-Cloud-Computing \
            proto/consensus.proto proto/kv.proto proto/backup.proto

      - name: Verify generated files are committed
        run: git diff --exit-code proto gen/go

      - name: Run Go tests after proto generation
        run: go test ./...