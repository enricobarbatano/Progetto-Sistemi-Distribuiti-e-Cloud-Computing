name: Docker Build and Security Scan

on:
  push:
    branches: [ main, master ]
    paths:
      - 'Dockerfile.*'
      - '.dockerignore'
      - 'cmd/**'
      - 'internal/**'
      - 'gen/go/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/docker-build-scan.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'Dockerfile.*'
      - '.dockerignore'
      - 'cmd/**'
      - 'internal/**'
      - 'gen/go/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/docker-build-scan.yml'

permissions:
  contents: read
  security-events: write

jobs:
  docker-build-scan:
    name: Build and scan service images
    runs-on: ubuntu-latest
    if: ${{ hashFiles('Dockerfile.consensus-node') != '' && hashFiles('Dockerfile.client-proxy') != '' && hashFiles('Dockerfile.backup-service') != '' }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: consensus-node
            dockerfile: Dockerfile.consensus-node
          - image: client-proxy
            dockerfile: Dockerfile.client-proxy
          - image: backup-service
            dockerfile: Dockerfile.backup-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image locally
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          tags: sdcc/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.36.0
        with:
          image-ref: sdcc/${{ matrix.image }}:${{ github.sha }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
