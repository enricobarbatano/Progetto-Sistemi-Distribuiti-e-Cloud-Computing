syntax = "proto3";

package kv;

option go_package = "github.com/enricobarbatano/Progetto-Sistemi-Distribuiti-e-Cloud-Computing/gen/go/kvpb;kvpb";

service KeyValueService {
  rpc Get(GetRequest) returns (GetResponse);
  rpc Put(PutRequest) returns (PutResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
}

message GetRequest {
  string key = 1;
}

message GetResponse {
  bool found = 1;
  string value = 2;
  string error = 3;
  string leader_hint = 4;
}

message PutRequest {
  string key = 1;
  string value = 2;
  string request_id = 3;
}

message PutResponse {
  bool success = 1;
  string error = 2;
  string leader_hint = 3;
}

message DeleteRequest {
  string key = 1;
  string request_id = 2;
}

message DeleteResponse {
  bool success = 1;
  string error = 2;
  string leader_hint = 3;
}