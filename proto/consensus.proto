syntax = "proto3";

package consensus;

option go_package = "github.com/enricobarbatano/Progetto-Sistemi-Distribuiti-e-Cloud-Computing/gen/go/consensuspb;consensuspb";

// ConsensusService contiene le RPC interne usate dai nodi di consenso.
// In questo progetto rappresenta una versione semplificata del protocollo Raft.
service ConsensusService {
  // Usata da un nodo Candidate per richiedere voti agli altri nodi.
  rpc RequestVote(RequestVoteRequest) returns (RequestVoteResponse);

  // Usata dal Leader per replicare log entries e inviare heartbeat.
  rpc AppendEntries(AppendEntriesRequest) returns (AppendEntriesResponse);

  // Usata dal Leader per inviare snapshot a follower troppo arretrati.
  rpc InstallSnapshot(InstallSnapshotRequest) returns (InstallSnapshotResponse);
}

// Ruolo corrente di un nodo nel cluster Raft.
enum NodeRole {
  NODE_ROLE_UNSPECIFIED = 0;
  NODE_ROLE_FOLLOWER = 1;
  NODE_ROLE_CANDIDATE = 2;
  NODE_ROLE_LEADER = 3;
}

// Tipo di operazione memorizzata nel log replicato.
enum LogOperation {
  LOG_OPERATION_UNSPECIFIED = 0;
  LOG_OPERATION_PUT = 1;
  LOG_OPERATION_DELETE = 2;
  LOG_OPERATION_NOOP = 3;
}

// Singola entry del log replicato.
message LogEntry {
  uint64 index = 1;
  uint64 term = 2;
  LogOperation operation = 3;
  string key = 4;
  string value = 5;
}

// Richiesta di voto inviata da un Candidate.
message RequestVoteRequest {
  uint64 term = 1;
  string candidate_id = 2;
  uint64 last_log_index = 3;
  uint64 last_log_term = 4;
}

// Risposta alla richiesta di voto.
message RequestVoteResponse {
  uint64 term = 1;
  bool vote_granted = 2;
}

// Richiesta AppendEntries usata sia per heartbeat sia per replicazione log.
message AppendEntriesRequest {
  uint64 term = 1;
  string leader_id = 2;
  uint64 prev_log_index = 3;
  uint64 prev_log_term = 4;
  repeated LogEntry entries = 5;
  uint64 leader_commit = 6;
}

// Risposta ad AppendEntries.
message AppendEntriesResponse {
  uint64 term = 1;
  bool success = 2;
  uint64 match_index = 3;

  // Informazioni usate dal leader per il fast back-off.
  //
  // Se success=false, il follower può indicare al leader un punto più utile
  // da cui riprovare la replica, evitando di decrementare nextIndex di uno
  // alla volta.
  //
  // conflict_term vale 0 quando il follower non possiede alcuna entry
  // all'indice richiesto.
  uint64 conflict_index = 4;
  uint64 conflict_term = 5;
}

// Richiesta per installare uno snapshot su un follower.
message InstallSnapshotRequest {
  uint64 term = 1;
  string leader_id = 2;
  uint64 last_included_index = 3;
  uint64 last_included_term = 4;
  uint64 offset = 5;
  bytes data = 6;
  bool done = 7;
}

// Risposta all'installazione dello snapshot.
message InstallSnapshotResponse {
  uint64 term = 1;
  bool success = 2;
}