syntax = "proto3";

package consensus;

option go_package = "github.com/enricobarbatano/Progetto-Sistemi-Distribuiti-e-Cloud-Computing/gen/go/consensuspb;consensuspb";

service ConsensusService {
  rpc RequestVote(RequestVoteRequest) returns (RequestVoteResponse);
  rpc AppendEntries(AppendEntriesRequest) returns (AppendEntriesResponse);
  rpc GetLeader(GetLeaderRequest) returns (GetLeaderResponse);
  rpc GetNodeState(GetNodeStateRequest) returns (GetNodeStateResponse);
  rpc InstallSnapshot(InstallSnapshotRequest) returns (InstallSnapshotResponse);
}

enum NodeRole {
  NODE_ROLE_UNSPECIFIED = 0;
  NODE_ROLE_FOLLOWER = 1;
  NODE_ROLE_CANDIDATE = 2;
  NODE_ROLE_LEADER = 3;
}

enum LogOperation {
  LOG_OPERATION_UNSPECIFIED = 0;
  LOG_OPERATION_PUT = 1;
  LOG_OPERATION_DELETE = 2;
  LOG_OPERATION_NOOP = 3;
}

message LogEntry {
  uint64 index = 1;
  uint64 term = 2;
  LogOperation operation = 3;
  string key = 4;
  string value = 5;
}

message RequestVoteRequest {
  string candidate_id = 1;
  uint64 term = 2;
  uint64 last_log_index = 3;
  uint64 last_log_term = 4;
}

message RequestVoteResponse {
  string node_id = 1;
  uint64 term = 2;
  bool vote_granted = 3;
}

message AppendEntriesRequest {
  string leader_id = 1;
  uint64 term = 2;
  uint64 prev_log_index = 3;
  uint64 prev_log_term = 4;
  repeated LogEntry entries = 5;
  uint64 leader_commit = 6;
}

message AppendEntriesResponse {
  string node_id = 1;
  uint64 term = 2;
  bool success = 3;
  uint64 match_index = 4;
}

message GetLeaderRequest {
}

message GetLeaderResponse {
  bool has_leader = 1;
  string leader_id = 2;
  string leader_address = 3;
  uint64 term = 4;
}

message GetNodeStateRequest {
}

message GetNodeStateResponse {
  string node_id = 1;
  NodeRole role = 2;
  uint64 current_term = 3;
  string voted_for = 4;
  uint64 commit_index = 5;
  uint64 last_applied = 6;
  uint64 last_log_index = 7;
  uint64 last_log_term = 8;
}

message InstallSnapshotRequest {
  string leader_id = 1;
  uint64 term = 2;
  uint64 last_included_index = 3;
  uint64 last_included_term = 4;
  bytes snapshot_data = 5;
}

message InstallSnapshotResponse {
  string node_id = 1;
  uint64 term = 2;
  bool success = 3;
}