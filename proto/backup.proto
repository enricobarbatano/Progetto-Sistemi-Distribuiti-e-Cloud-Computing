syntax = "proto3";

package backup;

option go_package = "github.com/enricobarbatano/Progetto-Sistemi-Distribuiti-e-Cloud-Computing/gen/go/backuppb;backuppb";

// BackupNodeService espone le RPC che ogni Consensus Node rende disponibili
// al Backup Service.
//
// Queste RPC non sono pensate per i client esterni: servono al Backup Service
// per orchestrare snapshot, download e compattazione remota del log.
service BackupNodeService {
  // Forza il nodo a creare uno snapshot locale della state machine.
  rpc TriggerSnapshot(TriggerSnapshotRequest) returns (TriggerSnapshotResponse);

  // Permette al Backup Service di scaricare lo snapshot locale del nodo.
  rpc DownloadSnapshot(DownloadSnapshotRequest) returns (DownloadSnapshotResponse);

  // Richiede al nodo di compattare il log fino a un certo indice.
  rpc CompactLog(CompactLogRequest) returns (CompactLogResponse);
}

// BackupService espone le RPC del servizio esterno di backup.
//
// Questo servizio è implementato dal componente backup-service.
// Serve per avviare manualmente un ciclo di backup e per leggere lo stato
// aggregato del servizio.
service BackupService {
  // Avvia un ciclo di backup coordinato sui nodi configurati.
  rpc TriggerBackup(TriggerBackupRequest) returns (TriggerBackupResponse);

  // Restituisce informazioni sullo stato del Backup Service.
  rpc GetBackupStatus(GetBackupStatusRequest) returns (GetBackupStatusResponse);
}

// Richiesta per forzare la creazione di uno snapshot su un Consensus Node.
message TriggerSnapshotRequest {
  string requester_id = 1;
}

// Risposta alla richiesta di snapshot su un Consensus Node.
message TriggerSnapshotResponse {
  bool accepted = 1;
  string node_id = 2;
  string snapshot_id = 3;
  uint64 last_included_index = 4;
  uint64 last_included_term = 5;
  string error = 6;
}

// Richiesta per scaricare lo snapshot locale di un Consensus Node.
message DownloadSnapshotRequest {
  string requester_id = 1;

  // Se vuoto, il nodo restituisce l'ultimo snapshot disponibile.
  string snapshot_id = 2;
}

// Risposta con i dati dello snapshot locale del nodo.
message DownloadSnapshotResponse {
  bool success = 1;
  string node_id = 2;
  string snapshot_id = 3;
  bytes snapshot_data = 4;
  uint64 last_included_index = 5;
  uint64 last_included_term = 6;
  string error = 7;
}

// Richiesta per compattare il log locale di un Consensus Node.
message CompactLogRequest {
  string requester_id = 1;
  string snapshot_id = 2;
  uint64 up_to_index = 3;
}

// Risposta alla compattazione del log.
message CompactLogResponse {
  bool success = 1;
  string node_id = 2;
  uint64 compacted_entries = 3;
  string error = 4;
}

// Richiesta per avviare un ciclo di backup coordinato.
message TriggerBackupRequest {
  string requester_id = 1;

  // Se true, il Backup Service chiede prima ai nodi di creare uno snapshot.
  bool force_snapshot = 2;

  // Se true, dopo aver scaricato correttamente gli snapshot, il Backup Service
  // invia CompactLog ai nodi.
  bool compact_after_download = 3;
}

// Risposta al ciclo di backup coordinato.
message TriggerBackupResponse {
  bool accepted = 1;
  string backup_id = 2;
  uint64 downloaded_snapshots = 3;
  string error = 4;
}

// Richiesta stato backup.
message GetBackupStatusRequest {}

// Risposta stato backup.
message GetBackupStatusResponse {
  string service_id = 1;
  string status = 2;

  uint64 created_backups = 3;
  uint64 downloaded_snapshots = 4;

  string last_backup_id = 5;
  string last_snapshot_id = 6;
  string last_error = 7;
}
